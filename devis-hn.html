<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./css/reset.css" rel="stylesheet" />
    <link href="./css/main.css" rel="stylesheet" />
    <link href="./css/header.css" rel="stylesheet" />
    <link href="./css/hn-main.css" rel="stylesheet" />
    <link href="./css/modal.css" rel="stylesheet" />

    <title>Admissions - SJDD</title>
</head>

<body>
    <header>
        <div>
            <img src="./images/logo.svg" alt="Logo de la clinique Saint-Jean de Dieu">
            <nav>
                <a href="index.html">Accueil</a>
                <a href="mineurs.html">Relance mineurs</a>
                <a href="majeurs.html">Relance majeurs</a>
                <a href="devis-nas.html">Devis NAS</a>
                <a href="devis-hn.html" class="active">Devis HN</a>
            </nav>
        </div>
        <div id="date-prepa">
            <p>Journée en cours de préparation : <span id="date-prepa-value"></span></p>
            <button id="open-modal" class="custom-button">Modifier</button>
        </div>
    </header>
    <main>
        <h1>Demande de devis pour patient Hors Nomenclature</h1>
        <form id="devis-hn">
            <h2>Informations sur le patient</h2>
            <label for="patient-name">Nom et prénom du patient :</label>
            <input type="text" id="patient-name" name="patient-name" required>

            <label for="patient-dob">Date de naissance du patient :</label>
            <input type="date" id="patient-dob" name="patient-dob" required>

            <label for="surgeon">Nom du chirurgien :</label>
            <select name="surgeon" id="surgeon" required>
                <option value="">Sélectionner un chirurgien</option>
                <option value="racy">Dr. Racy</option>
                <option value="davido">Dr. Davido</option>
                <option value="de-verbizier">Dr. De Verbizier</option>
                <option value="boutin">Dr. Boutin</option>
                <option value="samama">Dr. Samama</option>
                <option value="fitoussi">Dr. Fitoussi</option>
                <option value="barry-de-longchamps">Dr. Barry de Longchamps</option>
                <option value="lemazurier">Dr. Lemazurier</option>
                <option value="guilhard">Dr. Guilhard</option>
                <option value="sarfati">Dr. Sarfati</option>
            </select>

            <button type="submit" class="custom-button" id="generate-email" disabled>Générer le mail</button>
            <a type="submit" class="custom-button" id="send-email">Envoyer l'email</a>
        </form>
    </main>

    <div id="modal">
        <div id="modal-content">
            <h2>Date de la journée en cours de préparation</h2>
            <form>
                <label for="date-prepa">Sélectionner la date de la journée en cours de préparation</label>
                <input type="date" name="date-prepa" id="date-prepa">
                <div>
                    <button type="submit" class="custom-button">Valider</button>
                    <button type="button" id="close-modal" class="custom-button">Fermer</button>
                </div>
            </form>
        </div>
    </div>
    <script src="./js/header-date.js"></script>
    <script src="./js/modal-date.js"></script>
    <script src="./js/devis-hn.js"></script>
</body>

</html>
