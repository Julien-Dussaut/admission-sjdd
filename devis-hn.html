<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./css/reset.css" rel="stylesheet" />
    <link href="./css/header.css" rel="stylesheet" />
    <link href="./css/hn-main.css" rel="stylesheet" />
    <title>Admissions - SJDD</title>
</head>

<body>
    <header>
        <img src="./images/logo.svg" alt="Logo de la clinique Saint-Jean de Dieu">
        <nav>
            <a href="mineurs.html">Relance mineurs</a>
            <a href="devis-hn.html" class="active">Devis HN</a>
            <a href="#">Devis NAS</a>
        </nav>
    </header>
    <main>
        <h1>Demande de devis pour une intervention Hors Nomenclature</h1>

        <form id="devis-hn-form">
            <h2>Cocher les documents manquants au dossier</h2>

            <div id="form-field" id="form-field">
                <label for="ddn">Date de naissance patient : </label>
                <input type="date" name="ddn" id="ddn">
            </div>
            <div id="form-field">
                <input type="date" name="date-chir" id="date-chir">
                <label for="date-chir">Date de l'intervention</label>
            </div>
            <div id="form-field">
                <input type="checkbox" name="cni-mere" id="cni-mere">
                <label for="cni-mere">Identité mère</label>
            </div>
            <div id="form-field">
                <input type="checkbox" name="lf-naissance" id="lf-naissance">
                <label for="lf-naissance">Livret de famille / Acte de naissance</label>
            </div>
            <div id="form-field">
                <input type="checkbox" name="adm-mineur" id="adm-mineur">
                <label for="adm-mineur">Fiche admission patient mineur</label>
            </div>
            <div id="form-field">
                <input type="checkbox" name="ca" id="ca">
                <label for="ca">Consentement anesthésie</label>
            </div>
            <div id="form-field">
                <input type="checkbox" name="cc" id="cc">
                <label for="cc">Consentement chirurgie</label>
            </div>
            <div id="form-field">
                <input type="checkbox" name="da" id="da">
                <label for="da">Directives anticipées</label>
            </div>
            <div id="form-field">
                <input type="checkbox" name="pap" id="pap">
                <label for="pap">Personne à prévenir - de confiance</label>
            </div>
            <div id="form-field">
                <input type="checkbox" name="tt-donnees" id="tt-donnees">
                <label for="tt-donnees">E-SATIS</label>
            </div>

            <div id="form-field">
                <label for="mail">Email parent : </label>
                <input type="email" name="mail" id="mail">
            </div>

            <button type="submit" class="custom-button" id="generate-email" disabled>Générer l'email</button>
            <a type="submit" class="custom-button" id="send-email">Envoyer l'email</button>
        </form>
    </main>
    <script src="./js/mineurs.js"></script>
</body>

</html>
