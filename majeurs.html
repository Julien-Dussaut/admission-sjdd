<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./css/reset.css" rel="stylesheet" />
    <link href="./css/main.css" rel="stylesheet" />
    <link href="./css/header.css" rel="stylesheet" />
    <link href="./css/majeur-main.css" rel="stylesheet" />
    <link href="./css/modal.css" rel="stylesheet" />
    <title>Admissions - SJDD</title>
</head>

<body>
    <header>
        <div>
            <img src="./images/logo.svg" alt="Logo de la clinique Saint-Jean de Dieu">
            <nav>
                <a href="index.html">Accueil</a>
                <a href="mineurs.html">Relance mineurs</a>
                <a href="majeurs.html" class="active">Relance majeurs</a>
                <a href="devis-nas.html">Devis NAS</a>
                <a href="devis-hn.html">Devis HN</a>
            </nav>
        </div>
        <div id="date-prepa">
            <p>Journée en cours de préparation : <span id="date-prepa-value"></span></p>
            <button id="open-modal" class="custom-button">Modifier</button>
        </div>
    </header>
    <main>
        <h1>Relance patient majeur pour dossier incomplet</h1>

        <form id="majeur-form">

            <h2>Cocher les documents manquants au dossier</h2>

            <div id="form-field" id="form-field">
                <input type="checkbox" name="checkAll" id="checkAll">
                <label for="checkAll">Tous cocher</label>
            </div>
            <div id="form-field" id="form-field">
                <input type="checkbox" name="cni-patient" id="cni-patient">
                <label for="cni-patient">Identité patient</label>
            </div>
            <div id="form-field">
                <input type="checkbox" name="ca" id="ca">
                <label for="ca">Consentement anesthésie</label>
            </div>
            <div id="form-field">
                <input type="checkbox" name="cc" id="cc">
                <label for="cc">Consentement chirurgie</label>
            </div>
            <div id="form-field">
                <input type="checkbox" name="da" id="da">
                <label for="da">Directives anticipées</label>
            </div>
            <div id="form-field">
                <input type="checkbox" name="pap" id="pap">
                <label for="pap">Personne à prévenir - de confiance</label>
            </div>
            <div id="form-field">
                <input type="checkbox" name="tt-donnees" id="tt-donnees">
                <label for="tt-donnees">E-SATIS</label>
            </div>

            <div id="form-field">
                <label for="mail">Email parent : </label>
                <input type="email" name="mail" id="mail" required>
            </div>

            <button type="submit" class="custom-button" id="generate-email" disabled>Générer l'email</button>
            <a type="submit" class="custom-button" id="send-email">Envoyer l'email</a>
        </form>
    </main>
    <div id="modal">
        <div id="modal-content">
            <h2>Date de la journée en cours de préparation</h2>
            <form>
                <label for="date-prepa">Sélectionner la date de la journée en cours de préparation</label>
                <input type="date" name="date-prepa" id="date-prepa">
                <div>
                    <button type="submit" class="custom-button">Valider</button>
                    <button type="button" id="close-modal" class="custom-button">Fermer</button>
                </div>
            </form>
        </div>
    </div>

    <script src="./js/header-date.js"></script>
    <script src="./js/modal-date.js"></script>
    <script src="./js/majeurs.js"></script>
</body>

</html>
